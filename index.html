<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crafts men Server</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Flashy Animated Header */
        header {
            width: 100%;
            padding: 30px 0;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), transparent);
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .container {
            width: 90%;
            max-width: 450px;
            padding-bottom: 120px;
        }

        /* Glassmorphism Cards */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .card-title {
            font-size: 0.9rem;
            color: #cbd5e1;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Flashy Buttons */
        .upload-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .upload-btn:active {
            transform: scale(0.98);
        }

        input[type="file"] {
            margin-bottom: 15px;
            color: #94a3b8;
        }

        /* File Items */
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .file-name {
            font-weight: 500;
            font-size: 1rem;
            color: #f8fafc;
        }

        .file-size {
            font-size: 0.75rem;
            color: #94a3b8;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            text-decoration: none;
            padding: 8px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            transition: background 0.2s;
        }

        .btn-icon:hover { background: rgba(255,255,255,0.15); }

        /* Floating Footer Status */
        footer {
            position: fixed;
            bottom: 20px;
            width: 85%;
            max-width: 400px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, #818cf8, #c084fc);
            width: 45%; /* Example used space */
        }
    </style>
</head>
<body>

<header>
    <h1>Nebula Cloud</h1>
</header>

<div class="container">
    <div class="glass-card">
        <div class="card-title">🚀 Fast Upload</div>
        <form action="/upload" method="POST" enctype="multipart/form-data">
            <input type="file" name="upload">
            <button type="submit" class="upload-btn">Upload to SD</button>
        </form>
    </div>

    <div class="glass-card">
        <div class="card-title">📂 File Manager</div>
        <div class="file-item">
            <div style="display: flex; flex-direction: column;">
                <span class="file-name">Setup_Guide.pdf</span>
                <span class="file-size">420 KB</span>
            </div>
            <div class="actions">
                <a href="#" class="btn-icon">📥</a>
                <a href="#" class="btn-icon">🗑️</a>
            </div>
        </div>
    </div>
</div>

<footer>
    <div style="font-size: 0.8rem; color: #94a3b8;">Storage Used: 4.2GB / 16GB</div>
    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>
</footer>

</body>
</html>
